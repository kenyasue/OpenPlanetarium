# Static analysis settings (per docs/development-guidelines.md)
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - build/**
    - tool/**
    - src/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - always_declare_return_types
    - avoid_dynamic_calls
    - directives_ordering
    - prefer_final_locals
    - prefer_single_quotes
    - unawaited_futures
    - require_trailing_commas
